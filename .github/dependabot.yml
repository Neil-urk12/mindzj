# Dependabot configuration for MindZJ.
#
# Keeps npm, Cargo, and GitHub Actions dependencies up to date.
# Dependabot will open PRs automatically when new versions are
# available — complements the security audit steps in ci.yml.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
